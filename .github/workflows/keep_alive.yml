name: Keep Workflows Alive

# GitHub는 60일 동안 저장소 활동이 없으면 scheduled workflows를 자동 비활성화합니다
# 이 워크플로우는 주기적으로 실행되어 scheduled workflows가 비활성화되는 것을 방지합니다

on:
  schedule:
    # 매일 00:00 UTC (09:00 KST)에 실행 - 더 자주 실행하여 비활성화 방지
    - cron: '0 0 * * *'
    # 백업 스케줄: 매일 12:00 UTC (21:00 KST)
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update keep-alive timestamp
        run: |
          mkdir -p .github/metadata
          echo "Last keep-alive: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > .github/metadata/keep_alive.txt
          echo "This file prevents GitHub from disabling scheduled workflows" >> .github/metadata/keep_alive.txt

      - name: Commit keep-alive update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .github/metadata/keep_alive.txt

          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Keep workflows alive - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "✅ Keep-alive update committed"
          else
            echo "ℹ️ No changes to commit"
          fi

      - name: Verify scheduled workflows
        run: |
          echo "📊 Scheduled Workflows Status Check"
          echo "===================================="
          echo ""
          echo "✅ heartbeat.yml     - 3-min loop (primary backbone)"
          echo "✅ news_monitor.yml  - every 15 min (backup)"
          echo "✅ health_check.yml  - twice daily (00:00 / 12:00 UTC)"
          echo "✅ keep_alive.yml    - twice daily (00:00 / 12:00 UTC)"
          echo ""
          echo "For more info, visit:"
          echo "https://github.com/${{ github.repository }}/actions"
