name: News Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # 5분마다 실행 (Streamlit 슬립과 무관하게 독립 운영)

  # 수동 실행은 유지 (필요 시 테스트용)
  workflow_dispatch:

concurrency:
  group: news-monitor
  cancel-in-progress: false  # 실행 중인 run은 완료 대기 (취소하면 캐시 유실 위험)

permissions:
  contents: write  # 리포지토리에 쓰기 권한 부여 (DB 업데이트 커밋용)

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull latest data (just before run)
        run: |
          # 스크립트 실행 직전에 최신 data/ 파일을 가져옴
          # setup-python + pip install 이후에 실행하여 stale 데이터 최소화
          git fetch origin main
          git checkout origin/main -- data/ 2>/dev/null || echo "data/ fetch skipped (first run or conflict)"
          echo "Data files refreshed at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Run news monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          python standalone_monitor.py

      - name: Upload news database (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-db-${{ github.run_number }}
          path: data/news_monitor.csv
          retention-days: 7

      - name: Commit and push updated database
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # data 폴더의 모든 변경사항 추가
          git add data/

          # 변경사항이 있을 때만 커밋 및 푸시
          if ! git diff --staged --quiet; then
            git commit -m "Update news database and cache - $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || exit 0

            # 최대 3회 재시도 (rebase 전략: 원격 변경사항 위에 현재 커밋을 올림)
            # -X ours 대신 rebase 사용: 원격 sent_cache 데이터를 유지하면서 현재 변경사항 추가
            for i in 1 2 3; do
              echo "Push attempt $i..."
              if git pull --rebase origin main && git push; then
                echo "Push successful!"
                break
              else
                echo "Push failed, retrying in 5 seconds..."
                git rebase --abort 2>/dev/null || true
                sleep 5
              fi
            done
          else
            echo "No changes to commit - skipping push"
          fi
