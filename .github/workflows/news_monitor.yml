name: News Monitor

on:
  schedule:
    - cron: '*/10 * * * *'  # 10분마다 실행

  # 수동 실행은 유지 (필요 시 테스트용)
  workflow_dispatch:

concurrency:
  group: news-monitor
  cancel-in-progress: false  # 실행 중인 run은 완료 대기 (취소하면 캐시 유실 위험)

permissions:
  contents: write  # 리포지토리에 쓰기 권한 부여 (DB 업데이트 커밋용)

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull latest data (just before run)
        run: |
          # 스크립트 실행 직전에 최신 data/ 파일을 가져옴
          # setup-python + pip install 이후에 실행하여 stale 데이터 최소화
          git fetch origin main
          git checkout origin/main -- data/ 2>/dev/null || echo "data/ fetch skipped (first run or conflict)"
          echo "Data files refreshed at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          # sent_cache 크기 확인 (디버그)
          if [ -f data/sent_articles_cache.json ]; then
            COUNT=$(python3 -c "import json; d=json.load(open('data/sent_articles_cache.json')); print(len(d.get('url_timestamps',{})))" 2>/dev/null || echo "?")
            echo "sent_cache entries: $COUNT"
          fi

      - name: Run news monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          python standalone_monitor.py

      - name: Upload news database (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-db-${{ github.run_number }}
          path: data/news_monitor.csv
          retention-days: 7

      - name: Commit and push updated database
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add data/

          if ! git diff --staged --quiet; then
            git commit -m "Update news database and cache - $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || exit 0

            # 최대 3회 재시도
            # 매 시도마다: (1) remote rebase → (2) JSON 병합 → (3) push
            # git rebase로 health_check 등 다른 워크플로우와의 push 충돌 방지
            for i in 1 2 3; do
              echo "Push attempt $i..."

              git fetch origin main

              # remote/main을 로컬에 rebase → push 충돌 방지
              if ! git rebase origin/main; then
                echo "Rebase failed (attempt $i), aborting and retrying..."
                git rebase --abort 2>/dev/null || true
                sleep $((i * 5))
                continue
              fi

              # sent_cache / pending_queue JSON을 remote와 Union 병합
              # → 두 Job이 동시에 수정해도 발송 이력이 유실되지 않음
              python3 - <<'PYEOF'
import json, subprocess, os, sys

DATA = "data"

def git_show(path):
    r = subprocess.run(["git", "show", f"origin/main:{path}"],
                       capture_output=True, text=True)
    if r.returncode != 0:
        return None
    try:
        return json.loads(r.stdout)
    except Exception:
        return None

def merge_dict_key(local_path, top_key):
    if not os.path.exists(local_path):
        return
    remote = git_show(local_path)
    if not remote:
        return
    try:
        with open(local_path, "r", encoding="utf-8") as f:
            local = json.load(f)
        remote_items = remote.get(top_key, {})
        local_items  = local.get(top_key, {})
        # local 우선 union: 이번 Job에서 새로 발송/추가한 항목 보존
        merged = {**remote_items, **local_items}
        local[top_key] = merged
        if top_key == "url_timestamps":
            local["urls"] = list(merged.keys())
        local["count"] = len(merged)
        with open(local_path, "w", encoding="utf-8") as f:
            json.dump(local, f, ensure_ascii=False, indent=2)
        print(f"Merged {local_path}: remote={len(remote_items)}, local={len(local_items)}, total={len(merged)}")
    except Exception as e:
        print(f"Merge skipped ({local_path}): {e}", file=sys.stderr)

merge_dict_key(f"{DATA}/sent_articles_cache.json", "url_timestamps")
merge_dict_key(f"{DATA}/pending_articles.json",    "queue")
PYEOF

              git add data/sent_articles_cache.json data/pending_articles.json 2>/dev/null || true
              git diff --staged --quiet || git commit --amend --no-edit

              if git push; then
                echo "Push successful!"
                break
              else
                echo "Push failed (attempt $i), retrying in 5 seconds..."
                sleep 5
              fi
            done
          else
            echo "No changes to commit - skipping push"
          fi
