name: News Monitor

on:
  # 스케줄 비활성화: cron-job.org + Streamlit 경로로 단독 운영
  # schedule:
  #   - cron: '*/3 * * * *'

  # 수동 실행은 유지 (필요 시 테스트용)
  workflow_dispatch:

concurrency:
  group: news-monitor
  cancel-in-progress: false  # 실행 중인 run은 완료 대기 (취소하면 캐시 유실 위험)

permissions:
  contents: write  # 리포지토리에 쓰기 권한 부여 (DB 업데이트 커밋용)

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull latest data before run
        run: |
          # 런 시작 전 최신 data/ 파일을 원격에서 가져옴
          # 이전 런의 sent_cache, pending_queue, CSV가 stale하지 않도록 보장
          git fetch origin main
          git checkout origin/main -- data/ 2>/dev/null || echo "data/ fetch skipped (first run or conflict)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check open file descriptors (before)
        run: |
          echo "Open files before run:"
          lsof -p $$ 2>/dev/null | wc -l || echo "lsof not available - skipping check"

      - name: Run news monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          python standalone_monitor.py

      - name: Check open file descriptors (after)
        if: always()
        run: |
          echo "Open files after run:"
          lsof -p $$ 2>/dev/null | wc -l || echo "lsof not available - skipping check"

      - name: Upload news database (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-db-${{ github.run_number }}
          path: data/news_monitor.csv
          retention-days: 7

      - name: Commit and push updated database
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # data 폴더의 모든 변경사항 추가
          git add data/

          # 변경사항이 있을 때만 커밋 및 푸시
          if ! git diff --staged --quiet; then
            git commit -m "Update news database and cache - $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || exit 0

            # 최대 3회 재시도 (merge -X ours 전략: JSON 충돌 시 현재 런의 데이터 우선)
            for i in 1 2 3; do
              echo "Push attempt $i..."
              git fetch origin main
              # rebase 대신 merge 사용: JSON 파일 충돌 시 우리 데이터(현재 런) 우선
              if git merge origin/main -X ours --no-edit -m "Merge remote (keep local data)" 2>/dev/null && git push; then
                echo "Push successful!"
                break
              else
                echo "Push failed, retrying in 5 seconds..."
                git merge --abort 2>/dev/null || true
                sleep 5
              fi
            done
          else
            echo "No changes to commit - skipping push"
          fi
